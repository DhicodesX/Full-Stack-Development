<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tantraz Registration Form</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #1e3c72, #2a5298);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .form-container {
        background: white;
        padding: 30px;
        width: 450px;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #2a5298;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 15px;
    }

    input, select, textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    .options {
        margin-top: 8px;
    }

    .options label {
        font-weight: normal;
        display: inline-block;
        margin-right: 10px;
    }

    button {
        margin-top: 20px;
        width: 100%;
        padding: 10px;
        background: #2a5298;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        background: #1e3c72;
    }
</style>
</head>
<body>

<div class="form-container">
    <h2>Tantraz Registration</h2>

    <form>

        <!-- Full Name -->
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" required>

        <!-- Email -->
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>

        <!-- Participation Category -->
        <label for="category">Participation Category</label>
        <select id="category" name="category" required>
            <option value="">-- Select Category --</option>
            <option value="individual">Individual</option>
            <option value="team">Team</option>
            <option value="audience">Audience</option>
        </select>

        <!-- T-Shirt Size -->
        <label>T-Shirt Size</label>
        <div class="options">
            <label><input type="radio" name="size" value="S" required> S</label>
            <label><input type="radio" name="size" value="M"> M</label>
            <label><input type="radio" name="size" value="L"> L</label>
            <label><input type="radio" name="size" value="XL"> XL</label>
        </div>

        <!-- Technical Interests -->
        <label>Technical Interests</label>
        <div class="options">
            <label><input type="checkbox" name="interest" value="AI"> AI</label>
            <label><input type="checkbox" name="interest" value="Web Development"> Web Dev</label>
            <label><input type="checkbox" name="interest" value="Cloud Computing"> Cloud</label>
        </div>

        <!-- Textarea -->
        <label for="expectations">Expectations / Suggestions</label>
        <textarea id="expectations" name="expectations" rows="4"
                  placeholder="Write your expectations or suggestions here..."></textarea>

        <button type="submit">Register</button>

    </form>
</div>

</body>
</html>
