<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Filter UI</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            margin: 0;
        }

        /* Sidebar */
        .filters {
            width: 250px;
            padding: 20px;
            background: #f4f4f4;
        }

        h3 {
            margin-top: 20px;
        }

        /* Product Grid */
        .products {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .color-box {
            width: 20px;
            height: 20px;
            display: inline-block;
            border-radius: 50%;
            margin-right: 5px;
        }

        button {
            margin-top: 10px;
            padding: 5px 10px;
        }
    </style>
</head>
<body>

<!-- FILTER SECTION -->
<div class="filters">
    <h2>Filters</h2>

    <!-- Price -->
    <h3>Price Range</h3>
    <input type="number" id="minPrice" placeholder="Min"> -
    <input type="number" id="maxPrice" placeholder="Max">

    <!-- Color -->
    <h3>Color</h3>
    <select id="color">
        <option value="">All</option>
        <option value="Red">Red</option>
        <option value="Blue">Blue</option>
        <option value="Black">Black</option>
    </select>

    <!-- Brand -->
    <h3>Brand</h3>
    <select id="brand">
        <option value="">All</option>
        <option value="Nike">Nike</option>
        <option value="Adidas">Adidas</option>
        <option value="Puma">Puma</option>
    </select>

    <!-- Ratings -->
    <h3>Minimum Rating</h3>
    <select id="rating">
        <option value="">All</option>
        <option value="4">4★ & above</option>
        <option value="3">3★ & above</option>
    </select>

    <br><br>
    <button onclick="filterProducts()">Apply Filters</button>
</div>

<!-- PRODUCT SECTION -->
<div class="products" id="productList"></div>

<script>
    const products = [
        {name:"Nike Shoes", price:3000, color:"Red", brand:"Nike", rating:4},
        {name:"Adidas T-Shirt", price:1500, color:"Blue", brand:"Adidas", rating:3},
        {name:"Puma Jacket", price:2500, color:"Black", brand:"Puma", rating:5},
        {name:"Nike Cap", price:800, color:"Black", brand:"Nike", rating:4}
    ];

    function displayProducts(data){
        const list = document.getElementById("productList");
        list.innerHTML = "";
        data.forEach(p => {
            list.innerHTML += `
                <div class="card">
                    <h4>${p.name}</h4>
                    <p>₹${p.price}</p>
                    <p>${p.brand}</p>
                    <p>${p.rating} ★</p>
                </div>
            `;
        });
    }

    function filterProducts(){
        const min = document.getElementById("minPrice").value;
        const max = document.getElementById("maxPrice").value;
        const color = document.getElementById("color").value;
        const brand = document.getElementById("brand").value;
        const rating = document.getElementById("rating").value;

        let filtered = products.filter(p => {
            return (!min || p.price >= min) &&
                   (!max || p.price <= max) &&
                   (!color || p.color === color) &&
                   (!brand || p.brand === brand) &&
                   (!rating || p.rating >= rating);
        });

        displayProducts(filtered);
    }

    displayProducts(products);
</script>

</body>
</html>
